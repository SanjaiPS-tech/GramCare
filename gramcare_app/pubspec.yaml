name: gramcare_app
description: "GramCare - AI-Powered Rural Elderly Healthcare Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  connectivity_plus: ^6.1.4

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local Storage
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.32
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.6

  # Background Processing
  workmanager: ^0.5.2

  # Notifications
  flutter_local_notifications: ^19.0.1
  firebase_core: ^3.15.0
  firebase_messaging: ^15.3.0

  # Localization
  intl: any

  # Maps (OpenStreetMap - free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  # Authentication
  jwt_decoder: ^2.0.1

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # OCR
  google_mlkit_text_recognition: ^0.14.0

  # AI
  google_generative_ai: ^0.4.6

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Charts
  fl_chart: ^0.71.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  auto_size_text: ^3.0.0

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  telephony: ^0.2.0
  logger: ^2.5.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  internet_connection_checker_plus: ^2.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  retrofit_generator: ^9.1.8
  riverpod_generator: ^2.6.5
  drift_dev: ^2.26.0
  go_router_builder: ^2.9.0

  # Testing
  mockito: ^5.4.6
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
